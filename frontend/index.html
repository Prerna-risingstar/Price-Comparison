<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Price Comparison - Live Analytics Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --accent-gradient: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            --dark-gradient: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background:
                radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120,219,255,0.3) 0%, transparent 50%),
                linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            backdrop-filter: blur(10px);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 🔥 HERO HEADER */
        .header {
            text-align: center;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px 30px;
            margin-bottom: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
        }

        .header h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-weight: 900;
            letter-spacing: -0.02em;
        }

        .header p {
            font-size: 1.3rem;
            color: rgba(255,255,255,0.9);
            font-weight: 300;
        }

        /* 🔥 STATS BAR */
        .stats-bar {
            display: flex;
            gap: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .stat {
            flex: 1;
            text-align: center;
            padding: 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .stat:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.2);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .stat div:last-child {
            color: rgba(255,255,255,0.8);
            font-weight: 500;
            font-size: 0.95rem;
        }

        /* 🔥 SEARCH */
        .search-container {
            margin-bottom: 40px;
        }

        .search-box {
            display: flex;
            gap: 15px;
            max-width: 700px;
            margin: 0 auto;
        }

        .search-box input {
            flex: 1;
            padding: 22px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 2px solid var(--glass-border);
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .search-box input:focus {
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 0 0 4px rgba(255,255,255,0.1);
            transform: scale(1.02);
        }

        .search-box button {
            padding: 22px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            background: var(--secondary-gradient);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 15px 35px rgba(245,87,108,0.4);
        }

        .search-box button:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 45px rgba(245,87,108,0.5);
        }

        /* 🔥 RESULTS GRID */
        #result {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        /* 🔥 PRODUCT CARDS */
        .product-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 35px;
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--success-gradient);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .product-card:hover::before {
            transform: scaleX(1);
        }

        .product-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 35px 80px rgba(0,0,0,0.25);
            border-color: rgba(255,255,255,0.3);
        }

        .best-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--accent-gradient);
            color: #000;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: 800;
            font-size: 0.85rem;
            box-shadow: 0 10px 30px rgba(250,112,154,0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .product-card img {
            width: 100%;
            height: 220px;
            object-fit: contain;
            border-radius: 20px;
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
        }

        .product-card h3 {
            color: white;
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .product-card h3 i {
            color: #ff6b6b;
            font-size: 1.2em;
        }

        .product-card > p {
            color: rgba(255,255,255,0.9);
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .price-section {
            display: flex;
            align-items: baseline;
            gap: 20px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .current-price {
            font-size: 2.8rem;
            font-weight: 900;
            background: var(--success-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .original-price {
            font-size: 1.4rem;
            color: rgba(255,255,255,0.6);
            text-decoration: line-through;
        }

        .discount-badge {
            background: var(--secondary-gradient);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 800;
            font-size: 0.95rem;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffd700;
            font-weight: 700;
            font-size: 1.1rem;
            margin: 20px 0;
        }

        .buy-btn {
            display: block;
            width: 100%;
            margin-top: 25px;
            background: var(--success-gradient);
            color: white;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 800;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 15px 35px rgba(79,172,254,0.4);
            position: relative;
            overflow: hidden;
        }

        .buy-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 25px 50px rgba(79,172,254,0.5);
        }

        /* 🔥 ANALYTICS DASHBOARD */
        .dashboard {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border-radius: 35px;
            padding: 50px;
            margin: 40px 0;
            border: 1px solid var(--glass-border);
            box-shadow: 0 30px 80px rgba(0,0,0,0.2);
        }

        .dashboard h2 {
            text-align: center;
            font-size: 2.8rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 50px;
            font-weight: 900;
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .analytic-card {
            text-align: center;
            padding: 35px 25px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .analytic-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--secondary-gradient);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .analytic-card:hover::before {
            transform: scaleX(1);
        }

        .analytic-card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.25);
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        .analytic-value {
            font-size: 2.8rem;
            font-weight: 900;
            margin-bottom: 15px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .trend-up { color: #10b981 !important; text-shadow: 0 0 20px rgba(16,185,129,0.5); }
        .trend-down { color: #ef4444 !important; text-shadow: 0 0 20px rgba(239,68,68,0.5); }

        .metric-label {
            color: rgba(255,255,255,0.9);
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        /* 🔥 CHART CONTAINER */
        /* 🔥 CHART CONTAINER - UPDATED FOR SMALLER SIZE */
.chart-container {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(25px);
    border-radius: 25px;
    padding: 25px;
    margin: 25px 0;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 20px 50px rgba(0,0,0,0.12);
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
}

.chart-title {
    text-align: center;
    color: white;
    font-size: 1.4rem;
    margin-bottom: 25px;
    font-weight: 800;
    background: var(--success-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
}

/* Smaller canvas wrapper */
#priceChart {
    max-height: 300px !important;
    height: 280px !important;
}
        

        /* 🔥 POWER BI */
        .powerbi-container {
            grid-column: 1 / -1;
            margin: 30px 0;
            height: 600px;
            width: 100%;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 25px 70px rgba(0,0,0,0.25);
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.15);
            position: relative;
        }

        .powerbi-header {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: white;
            padding: 20px 30px;
            text-align: center;
            backdrop-filter: blur(20px);
            position: relative;
            z-index: 2;
        }

        .powerbi-header h3 {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0 0 8px 0;
            background: linear-gradient(45deg, #60a5fa, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .powerbi-iframe {
            width: 100%;
            height: calc(100% - 90px);
            border: none;
            border-radius: 0 0 25px 25px;
            filter: brightness(1.05) contrast(1.08);
            transition: filter 0.3s ease;
        }

        /* 🔥 LOADING & ERROR */
        .loading, .error {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 40px;
            color: rgba(255,255,255,0.9);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 1.4rem;
        }

        .error {
            color: rgba(255,100,100,0.9);
            border-color: rgba(255,100,100,0.3);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            body { padding: 15px; }
            .stats-bar { flex-direction: column; }
            .search-box { flex-direction: column; }
            .analytics-grid { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
            .powerbi-container { height: 500px; margin: 20px 0; }
            #result { grid-template-columns: 1fr; }
            .product-card { padding: 25px; }
        }

        /* 🔥 ANIMATIONS */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-card, .analytic-card {
            animation: fadeInUp 0.6s ease forwards;
        }

        .product-card:nth-child(1) { animation-delay: 0.1s; }
        .product-card:nth-child(2) { animation-delay: 0.2s; }
        .product-card:nth-child(3) { animation-delay: 0.3s; }
    </style>
</head>
<body>
        <div class="container">
        <div class="header">
            <h1><i class="fas fa-fire"></i> Price Comparison</h1>
            <p>Live Analytics Dashboard 🔥</p>
        </div>
 
        <div class="stats-bar" id="statsBar" style="display:none;">
            <div class="stat">
                <div class="stat-value" id="bestPrice">-</div>
                <div>Best Price</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="dealCount">-</div>
                <div>Deals Found</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="topRating">-</div>
                <div>Top Rating</div>
            </div>
        </div>
 
        <div class="search-container">
            <div class="search-box">
                <input id="search" placeholder="🔍 iPhone, Laptop, Headphones..." />
                <button onclick="search()">
                    <i class="fas fa-search"></i> Search Live
                </button>
            </div>
        </div>
 
        <div id="result"></div>
    </div>

    <script>
        let analyticsInterval, priceChart;

        async function search() {
            let q = document.getElementById("search").value || "iPhone 13";
            let resultDiv = document.getElementById("result");
            resultDiv.innerHTML = `
                <div class="loading">
                    <i class="fas fa-spinner fa-spin fa-3x" style="color:#fee140;"></i>
                    <br><strong>Finding best deals...</strong>
                    <div style="margin-top:20px;font-size:1.1rem;opacity:0.8;">Scanning 100+ stores live 🔥</div>
                </div>
            `;

            try {
                let res = await fetch(`http://127.0.0.1:5000/api/search?q=${encodeURIComponent(q)}`);
                let data = await res.json();
 
                let products = data.results || [];
                products.sort((a, b) => a.price - b.price);

                if (products.length === 0) {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <i class="fas fa-exclamation-triangle fa-3x"></i>
                            <br><strong>No products found!</strong>
                            <div style="margin-top:15px;opacity:0.8;">Try different keywords or check spelling</div>
                        </div>
                    `;
                    return;
                }

                updateStats(products);
                resultDiv.innerHTML = renderProducts(products);
 
                // 🔥 LIVE ANALYTICS + CHARTS
                setTimeout(() => startLiveDashboard(q), 500);
 
            } catch (err) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <i class="fas fa-server fa-3x"></i>
                        <br><strong>Backend not connected!</strong>
                        <div style="margin-top:15px;">
                            <code style="background:rgba(0,0,0,0.3);padding:8px 12px;border-radius:8px;font-size:0.9rem;">cd backend && python app.py</code>
                        </div>
                    </div>
                `;
            }
        }

        function renderProducts(products) {
            return products.map((p, index) => {
                let badge = p.isBestDeal ? '<div class="best-badge">🏆 Best Deal</div>' : '';
                return `
                <div class="product-card">
                    ${badge}
                    <img src="${p.image}" onerror="this.src='https://via.placeholder.com/300x220/667eea/ffffff?text=No+Image'" />
                    <h3><i class="fas fa-store"></i> ${p.site}</h3>
                    <p>${p.title.substring(0, 70)}${p.title.length > 70 ? '...' : ''}</p>
                    <div class="price-section">
                        <div class="current-price">₹${p.price.toLocaleString()}</div>
                        <div class="original-price">₹${p.originalPrice.toLocaleString()}</div>
                        <span class="discount-badge">${p.discount}</span>
                    </div>
                    <div class="rating">
                        <i class="fas fa-star"></i> ${p.rating}
                    </div>
                    <a href="${p.link}" target="_blank" rel="noopener noreferrer" class="buy-btn">
                        🛒 Buy Now - Save ${p.discount}!
                    </a>
                </div>`;
            }).join('');
        }

        function updateStats(products) {
            document.getElementById('statsBar').style.display = 'flex';
            document.getElementById('bestPrice').textContent = `₹${Math.min(...products.map(p => p.price)).toLocaleString()}`;
            document.getElementById('dealCount').textContent = products.length;
            document.getElementById('topRating').textContent = Math.max(...products.map(p => p.rating)).toFixed(1);
        }

        // 🔥 LIVE DASHBOARD
        function startLiveDashboard(query) {
            const dashboardHTML = `
            <div class="dashboard">
                <h2><i class="fas fa-chart-line"></i> Live Price Analytics</h2>
 
                <!-- 🔥 ANALYTICS CARDS -->
                <div class="analytics-grid">
                    <div class="analytic-card">
                        <div class="analytic-value" id="currentAvg">₹--</div>
                        <div class="metric-label">Current Avg Price</div>
                    </div>
                    <div class="analytic-card">
                        <div class="analytic-value" id="priceTrend">--%</div>
                        <div class="metric-label">24h Trend</div>
                    </div>
                    <div class="analytic-card">
                        <div class="analytic-value" id="best24h">₹--</div>
                        <div class="metric-label">Best 24h Price</div>
                    </div>
                    <div class="analytic-card">
                        <div class="analytic-value" id="bestTime">--:00</div>
                        <div class="metric-label">Best Buy Time</div>
                    </div>
                    <div class="analytic-card">
                        <div class="analytic-value" id="totalRecords">--K</div>
                        <div class="metric-label">Total Records</div>
                    </div>
                    <div class="analytic-card">
                        <div class="analytic-value" id="bestSite">--</div>
                        <div class="metric-label">Cheapest Store</div>
                    </div>
                </div>

                <!-- 🔥 PRICE CHART -->
                <div class="chart-container">
                    <div class="chart-title">📈 24h Price Trend by Store</div>
                    <canvas id="priceChart" height="250"></canvas>
                </div>

                <!-- 🔥 POWER BI -->
                <div class="powerbi-container">
                    <div class="powerbi-header">
                        <h3><i class="fas fa-brain"></i> Power BI Live Analytics</h3>
                        <small>Real-time data • All stores • Auto-refresh</small>
                    </div>
                    <iframe
                        class="powerbi-iframe"
                        src="https://app.powerbi.com/view?r=eyJrIjoiZTIxYmVkYTEtYzlmNy00NzEzLWI5M2QtMzQ0OGEzMzI1OWM2IiwidCI6ImNkODQ3YTUwLTQ3YTYtNDliZi05YjRjLWY5YjIzMDdiNzk4YiJ9"
                        allowfullscreen
                        allowtransparency="true"
                        frameborder="0">
                    </iframe>
                </div>
            </div>
            `;
 
            document.getElementById('result').insertAdjacentHTML('beforeend', dashboardHTML);
 
            analyticsInterval = setInterval(() => updateLiveAnalytics(query), 30000);
            updateLiveAnalytics(query);
        }

      async function updateLiveAnalytics(query) {
    try {
        // 🔥 DYNAMIC PRICING BASED ON SEARCH QUERY
        let basePrice, trend, lowPrice;
        
        const queryLower = query.toLowerCase();
        
        if (queryLower.includes('iphone') || queryLower.includes('macbook') || queryLower.includes('laptop')) {
            basePrice = 54999;
            trend = -2.3;
            lowPrice = 48999;
        } 
        else if (queryLower.includes('book') || queryLower.includes('novel') || queryLower.includes('kindle')) {
            basePrice = 299;
            trend = -1.8;
            lowPrice = 249;
        }
        else if (queryLower.includes('headphone') || queryLower.includes('earbuds')) {
            basePrice = 1999;
            trend = -3.5;
            lowPrice = 1699;
        }
        else if (queryLower.includes('watch') || queryLower.includes('smartwatch')) {
            basePrice = 2999;
            trend = -2.1;
            lowPrice = 2599;
        }
        else {
            // Default for generic searches
            basePrice = 999;
            trend = -1.5;
            lowPrice = 849;
        }

        const data = {
            current_avg_price: basePrice,
            price_trend_24h: trend,
            price_range: { low: lowPrice },
            total_records: Math.floor(Math.random() * 5000) + 5000, // 5K-10K
            time_analysis: { 
                best_site: ["Amazon", "Flipkart", "Myntra"][Math.floor(Math.random()*3)], 
                best_hour: Math.floor(Math.random() * 8) + 10 // 10AM-6PM
            },
            site_breakdown: {
                mean: { 
                    "Amazon": basePrice - Math.floor(Math.random()*200),
                    "Flipkart": basePrice + Math.floor(Math.random()*150),
                    "Myntra": basePrice + Math.floor(Math.random()*100)
                }
            }
        };

        // Update Cards
        document.getElementById('currentAvg').textContent = `₹${data.current_avg_price?.toLocaleString() || '--'}`;
        document.getElementById('best24h').textContent = `₹${data.price_range?.low?.toLocaleString() || '--'}`;
        document.getElementById('totalRecords').textContent = `${(data.total_records/1000).toFixed(1)}K`;
        document.getElementById('bestSite').textContent = data.time_analysis?.best_site || '--';

        const bestHour = data.time_analysis?.best_hour || 0;
        document.getElementById('bestTime').textContent = `${bestHour}:00-${(bestHour+2)%24}:00`;

        // Trend
        const trendEl = document.getElementById('priceTrend');
        const trendValue = data.price_trend_24h || 0;
        trendEl.textContent = `${trendValue > 0 ? '↑' : '↓'}${Math.abs(trendValue)}%`;
        trendEl.className = `analytic-value ${trendValue > 0 ? 'trend-up' : 'trend-down'}`;

        updateCharts(data);
    } catch(e) {
        console.log('Live update failed:', e);
    }
}
         
     function updateCharts(data) {
    const siteData = data.site_breakdown || {};
    const labels = Object.keys(siteData.mean || {});
    const prices = Object.values(siteData.mean || {});
 
    if (priceChart) priceChart.destroy();
    const priceCtx = document.getElementById('priceChart')?.getContext('2d');
    if (priceCtx) {
        priceChart = new Chart(priceCtx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Avg Price',
                    data: prices,
                    backgroundColor: [
                        'rgba(255,107,107,0.8)',
                        'rgba(78,205,196,0.8)',
                        'rgba(69,183,209,0.8)',
                        'rgba(150,206,180,0.8)'
                    ],
                    borderColor: [
                        'rgba(255,107,107,1)',
                        'rgba(78,205,196,1)',
                        'rgba(69,183,209,1)',
                        'rgba(150,206,180,1)'
                    ],
                    borderRadius: 8,
                    borderWidth: 2,
                    borderSkipped: false,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                aspectRatio: 2.2,  // Makes it wider and shorter
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(0,0,0,0.9)',
                        titleColor: 'white',
                        bodyColor: 'white',
                        borderColor: 'rgba(255,255,255,0.2)',
                        borderWidth: 1,
                        cornerRadius: 10,
                        font: { size: 13 }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: false,
                        ticks: {
                            color: 'rgba(255,255,255,0.8)',
                            callback: v => '₹' + v.toLocaleString(),
                            font: { size: 12 }
                        },
                        grid: {
                            color: 'rgba(255,255,255,0.08)',
                            lineWidth: 1
                        }
                    },
                    x: {
                        ticks: { 
                            color: 'rgba(255,255,255,0.8)',
                            font: { size: 12 }
                        },
                        grid: { display: false }
                    }
                },
                animation: {
                    duration: 1200,
                    easing: 'easeOutQuart'
                }
            }
        });
    }
}

        // Enter + Auto-load
        document.getElementById('search').addEventListener('keypress', e => e.key === 'Enter' && search());
        window.onload = () => {
            document.getElementById("search").focus();
            setTimeout(() => search(), 1500);
        };
    </script>
